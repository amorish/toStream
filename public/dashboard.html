<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Dashboard - toStream</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=block" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "on-surface-variant": "#a1a3b1",
                    "on-surface": "#f0f2f8",
                    "surface-container-highest": "#242426",
                    "primary-container": "#4f46e5",
                    "on-primary-fixed-variant": "#c7d2fe",
                    "on-error-container": "#f87171",
                    "secondary-fixed": "#2a2b2f",
                    "outline-variant": "#3f4046",
                    "surface-container-low": "#1a1a1c",
                    "on-tertiary-container": "#ddd6fe",
                    "on-background": "#f0f2f8",
                    "background": "#131313",
                    "on-secondary-fixed-variant": "#d1d5db",
                    "error": "#ef4444",
                    "surface": "#131313",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#e0e7ff",
                    "secondary-container": "#2a2b2f",
                    "error-container": "#450a0a",
                    "tertiary-container": "#5b21b6",
                    "surface-container-high": "#2c2c2e",
                    "inverse-on-surface": "#131313",
                    "inverse-surface": "#f0f2f8",
                    "surface-variant": "#25262b",
                    "tertiary": "#a78bfa",
                    "secondary-fixed-dim": "#4b4d5a",
                    "on-tertiary-fixed-variant": "#c4b5fd",
                    "inverse-primary": "#6366f1",
                    "surface-dim": "#0e0e0f",
                    "surface-bright": "#1e1e20",
                    "tertiary-fixed-dim": "#7c3aed",
                    "primary-fixed-dim": "#4f46e5",
                    "surface-tint": "#6366f1",
                    "surface-container": "#202022",
                    "outline": "#585a68",
                    "on-tertiary-fixed": "#f5f3ff",
                    "on-primary-container": "#e0e2ff",
                    "on-secondary-fixed": "#f9fafb",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ede9fe",
                    "on-secondary": "#ffffff",
                    "surface-container-lowest": "#0a0a0a",
                    "secondary": "#9ca3af",
                    "primary": "#6366f1",
                    "primary-fixed": "#e0e2ff",
                    "on-secondary-container": "#d1d5db"
                },
                "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
                },
                "spacing": {
                    "gutter": "24px",
                    "container-max": "1200px"
                },
                "fontFamily": {
                    "headline": ["Plus Jakarta Sans", "sans-serif"],
                    "display": ["Plus Jakarta Sans", "sans-serif"],
                    "body": ["Plus Jakarta Sans", "sans-serif"],
                    "label": ["Plus Jakarta Sans", "sans-serif"]
                }
            }
        }
    }
  </script>
  <link rel="stylesheet" href="/css/neo.css">
<link rel="icon" href="/img/orglogo.webp" type="image/webp">
</head>
<body class="bg-background text-on-background font-body antialiased">

  <!-- TopNavBar -->
  <header class="absolute top-0 w-full z-50 px-gutter py-4 max-w-container-max mx-auto left-1/2 -translate-x-1/2">
    <div class="neo-extruded rounded-2xl px-4 md:px-8 py-3 flex flex-row justify-between items-center bg-background/80 backdrop-blur-xl gap-4 md:gap-0">
      <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
        <img src="/img/orglogo.webp?v=2" alt="toStream Logo" class="h-14 scale-110 w-auto object-contain">
        <span class="text-2xl font-extrabold tracking-tight">
          <span class="text-primary">to</span><span class="text-black dark:text-white">Stream</span>
        </span>
      </div>
      <div class="flex items-center gap-6">
        <span id="welcome-text" class="text-on-surface-variant font-medium hidden md:block"></span>
        <button id="logout-btn" class="px-6 py-2 rounded-xl neo-button text-on-surface font-medium transition-all text-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="relative pt-44 md:pt-32 min-h-screen max-w-container-max mx-auto px-gutter pb-20">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6 w-full text-left">
      <div>
        <h2 class="text-4xl font-extrabold text-on-background">Your Dashboard</h2>
        <p class="text-on-surface-variant mt-2">Manage your private streams</p>
      </div>
      <button onclick="document.getElementById('create-modal').style.display='flex'" class="px-8 py-4 rounded-xl neo-button-primary font-bold inline-flex items-center gap-2">
        <span class="material-symbols-outlined">add</span>
        New Room
      </button>
    </div>

    <div class="space-y-6">
      <h3 class="text-2xl font-bold text-on-background flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">history</span>
        Recent Rooms
      </h3>
      <div id="rooms-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <p class="text-on-surface-variant col-span-full">Loading rooms...</p>
      </div>
    </div>
  </main>

  <!-- Create Room Modal -->
  <div id="create-modal" class="modal">
    <div class="neo-extruded rounded-[2rem] p-10 w-full max-w-md mx-4 relative">
      <button type="button" class="absolute top-6 right-6 w-10 h-10 rounded-full neo-button flex justify-center items-center text-on-surface-variant hover:text-error transition-colors" 
              onclick="document.getElementById('create-modal').style.display='none'">
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
      
      <h3 class="text-2xl font-bold mb-6">Create a Room</h3>
      
      <form id="create-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Room Name (optional)</label>
          <input type="text" id="room-name" placeholder="Movie Night" class="w-full px-4 py-3 rounded-xl neo-pressed focus:outline-none focus:ring-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Default Mode</label>
          <select id="room-mode" class="w-full px-4 py-3 rounded-xl neo-pressed focus:outline-none focus:ring-1">
            <option value="camera">Camera & Voice</option>
            <option value="url-video">Watch Video</option>
            <option value="music">Listen to Music</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Description (optional)</label>
          <textarea id="room-description" placeholder="What is this meeting about?" class="w-full px-4 py-3 rounded-xl neo-pressed focus:outline-none focus:ring-1" rows="2"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Password (required)</label>
          <input type="password" id="room-password" required placeholder="Set a secure password" class="w-full px-4 py-3 rounded-xl neo-pressed focus:outline-none focus:ring-1">
        </div>
        <button type="submit" id="create-btn" class="w-full py-4 rounded-xl neo-button-primary font-bold mt-4">Create & Join</button>
      </form>
    </div>
  </div>

  <!-- Join Room Modal -->
  <div id="join-modal" class="modal">
    <div class="neo-extruded rounded-[2rem] p-10 w-full max-w-md mx-4 relative">
      <button type="button" class="absolute top-6 right-6 w-10 h-10 rounded-full neo-button flex justify-center items-center text-on-surface-variant hover:text-error transition-colors" 
              onclick="document.getElementById('join-modal').style.display='none'">
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
      
      <h3 class="text-2xl font-bold mb-2">Join Private Room</h3>
      <p class="text-on-surface-variant text-sm mb-6">This room is password protected.</p>
      
      <form id="join-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Password</label>
          <input type="password" id="join-password" required class="w-full px-4 py-3 rounded-xl neo-pressed focus:outline-none focus:ring-1">
        </div>
        <input type="hidden" id="join-room-id">
        <button type="submit" id="join-submit-btn" class="w-full py-4 rounded-xl neo-button-primary font-bold mt-4">Join Room</button>
      </form>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  
  <script>
    // We override the loadHistory function to output the Tailwind classes for the cards
    // This script block ensures it loads before dashboard.js initializes loadHistory
    window.loadHistoryOverride = async function() {
      const list = document.getElementById('rooms-list');
      try {
        const data = await apiFetch('/api/rooms/history');
        if (data && data.success) {
          if (data.rooms.length === 0) {
            list.innerHTML = '<p class="text-on-surface-variant col-span-full">No rooms yet. Create one!</p>';
            return;
          }
          list.innerHTML = data.rooms.map(room => {
            const isExpired = room.isExpired || !room.isActive;
            return `
            <div class="neo-extruded p-6 rounded-2xl flex flex-col justify-between transition-all ${isExpired ? 'opacity-50' : 'hover:-translate-y-1 hover:border-primary/30'}">
              <div>
                <h4 class="text-xl font-bold text-on-background mb-2">${escapeHtml(room.name || 'Unnamed Room')}</h4>
                <p class="font-mono text-sm text-primary mb-2">${room.roomId}</p>
                ${room.description ? `<p class="text-sm text-on-surface mb-3 line-clamp-2">${escapeHtml(room.description)}</p>` : ''}
                <p class="text-xs text-on-surface-variant mb-6">${formatDate(room.createdAt)}</p>
              </div>
              <div class="flex justify-end">
                ${isExpired 
                  ? '<span class="px-4 py-2 rounded-lg bg-surface-container text-on-surface-variant text-sm font-bold">Expired</span>' 
                  : `<button onclick="attemptJoin('${room.roomId}')" class="px-6 py-2 rounded-lg neo-button text-primary font-bold">Join</button>`
                }
              </div>
            </div>
            `;
          }).join('');
        }
      } catch (e) {
        list.innerHTML = '<p class="text-error col-span-full">Failed to load history</p>';
      }
    };
  </script>
  <script src="/js/dashboard.js"></script>
  <script>
    if (redirectIfNotLoggedIn()) throw new Error('Not logged in');
    // Override dashboard.js loadHistory
    loadHistory = window.loadHistoryOverride;
    // Load it immediately since we overwrote the reference after DOMContentLoaded in dashboard.js
    loadHistory();
  </script>
</body>
</html>

  <style>
    /* Room specific styles */
    .room-body { overflow: hidden; height: 100vh; height: 100dvh; }
    .room-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    .room-header { height: 72px; flex-shrink: 0; }
    .room-main { flex: 1; position: relative; overflow: hidden; }
    .view-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; }
    .room-footer { height: 80px; flex-shrink: 0; }
    
    .pip-mode .video-grid { position: absolute; bottom: 20px; right: 20px; width: auto; height: auto; flex-direction: row; z-index: 10; padding: 0; gap: 16px;}
    .pip-mode .video-wrapper { height: 120px; aspect-ratio: 16/9; width: auto; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .pip-mode #remote-waiting-layer .material-symbols-outlined { font-size: 32px; line-height: 1; margin-bottom: 4px; }
    .pip-mode #remote-label { font-size: 12px; text-align: center; line-height: 1.2; padding: 0 4px; }
    .pip-mode .video-wrapper > div.absolute { bottom: 8px; left: 8px; padding: 4px 8px; }
    .pip-mode #local-label, .pip-mode #remote-overlay-label { font-size: 11px; }
    
    /* Remote Audio-Only Capsule */
    .video-wrapper.remote-audio-only {
      position: absolute !important;
      bottom: 24px;
      right: 24px;
      width: auto !important;
      height: auto !important;
      flex: none !important;
      background: transparent !important;
      box-shadow: none !important;
      border: none !important;
      z-index: 50;
    }
    .video-wrapper.remote-audio-only #remote-video,
    .video-wrapper.remote-audio-only #remote-waiting-layer {
      display: none !important;
    }
    .video-wrapper.remote-audio-only #remote-overlay-container {
      position: relative !important;
      bottom: auto !important;
      left: auto !important;
      margin: 0 !important;
    }
    
    @media (max-width: 768px) { 
      .pip-mode .video-grid { flex-direction: row; gap: 8px; right: 16px; bottom: 16px; } 
      .pip-mode .video-wrapper { height: 80px; } 
      .pip-mode .video-wrapper > div.absolute { bottom: 6px; left: 6px; padding: 2px 6px; }
      .video-wrapper.remote-audio-only { bottom: 16px; right: 16px; }
    }
    
    /* Fix Plyr Video Size */
    .plyr { border-radius: 1rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: all 0.3s ease; }
    .plyr__video-wrapper { height: 100% !important; padding-bottom: 0 !important; }
    .plyr iframe { width: 100% !important; height: 100% !important; }
    
    /* Video Fit Classes */
    .plyr-fit-normal { width: 100%; max-width: 1200px; aspect-ratio: 16 / 9; max-height: 100%; margin: 0; }
    .plyr-fit-crop { width: 100% !important; height: 100% !important; max-width: none !important; aspect-ratio: unset !important; }
    .plyr-fit-crop video, .plyr-fit-crop iframe { object-fit: cover !important; }
    .plyr-fit-full-width { width: 100% !important; max-width: none !important; aspect-ratio: 16/9 !important; height: auto !important; max-height: none !important; }
    .plyr-fit-full-width video, .plyr-fit-full-width iframe { object-fit: contain !important; }
    .plyr-fit-full-height { height: 100% !important; max-height: none !important; width: auto !important; aspect-ratio: 16/9 !important; max-width: none !important; margin: 0 auto !important; }
    .plyr-fit-full-height video, .plyr-fit-full-height iframe { object-fit: contain !important; }

    /* Waveform Animation */
    .waveform.speaking span { animation: pulse-wave 0.4s infinite alternate ease-in-out; }
    .waveform.speaking span:nth-child(2) { animation-delay: 0.15s; }
    .waveform.speaking span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse-wave { 0% { height: 3px; } 100% { height: 12px; } }
    
    /* Mobile Rotation */
    @media (max-width: 768px) {
      .mobile-rotated {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        width: 100vh !important; 
        width: 100dvh !important;
        height: 100vw !important;
        transform: translate(-50%, -50%) rotate(90deg) !important;
        z-index: 9999 !important;
        overflow: hidden !important;
      }
    }
  </style>

            <video id="local-video" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <div class="absolute bottom-4 left-4 bg-background/80 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10 flex items-center gap-2">

  <script>
    window.updateUIOverride = function(mode) {
      document.querySelectorAll('.mode-btn').forEach(b => {
        b.classList.remove('active', 'text-primary', 'bg-white/5');
        b.classList.add('text-on-surface-variant');
      });
      const activeBtn = document.querySelector(`.mode-btn[data-mode="${mode}"]`);
      if(activeBtn) {
        activeBtn.classList.remove('text-on-surface-variant');
        activeBtn.classList.add('active', 'text-primary', 'bg-white/5');
      }

      document.querySelectorAll('.view-layer').forEach(v => {
        v.classList.remove('active');
        v.classList.add('hidden');
      });

      const targetView = document.getElementById(`${mode}-view`);
      if(targetView) {
        targetView.classList.remove('hidden');
        targetView.classList.add('active');
      }

      if (mode === 'url-video') {
        const camView = document.getElementById('camera-view');
        camView.classList.remove('hidden');
        camView.classList.add('pip-mode');
      } else {
        document.getElementById('camera-view').classList.remove('pip-mode');
      }
    };
  </script>

  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="/js/socket-client.js"></script>
  <script src="/js/webrtc.js"></script>
  <script src="/js/video-sync.js"></script>
  <script src="/js/music.js"></script>

  <script>
    if (redirectIfNotLoggedIn()) throw new Error('Not logged in');
    updateUIForMode = window.updateUIOverride;
    
    // Video Fit Logic
    document.addEventListener('DOMContentLoaded', () => {
      const fitBtn = document.getElementById('video-fit-btn');
      const fitMenu = document.getElementById('video-fit-menu');
      const fitOptions = document.querySelectorAll('.fit-option');
      
      fitBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fitMenu.classList.toggle('hidden');
        fitMenu.classList.toggle('flex');
      });

      document.addEventListener('click', (e) => {
        if (!fitBtn.contains(e.target) && !fitMenu.contains(e.target)) {
          fitMenu.classList.add('hidden');
          fitMenu.classList.remove('flex');
        }
      });

      fitOptions.forEach(opt => {
        opt.addEventListener('click', () => {
          const fitMode = opt.getAttribute('data-fit');
          const plyrContainer = document.querySelector('.plyr');
          
          if (plyrContainer) {
            // Remove existing fit classes
            plyrContainer.classList.remove('plyr-fit-normal', 'plyr-fit-crop', 'plyr-fit-full-width', 'plyr-fit-full-height');
            plyrContainer.classList.add(`plyr-fit-${fitMode}`);
          }
          
          // Update active style
          fitOptions.forEach(o => {
            o.classList.remove('text-primary', 'font-bold');
            o.classList.add('text-on-surface-variant');
          });
          opt.classList.remove('text-on-surface-variant');
          opt.classList.add('text-primary', 'font-bold');
          
          fitMenu.classList.add('hidden');
          fitMenu.classList.remove('flex');
        });
      });
      
      // Mobile Rotation Logic
      const rotateBtn = document.getElementById('rotate-btn');
      const roomContainer = document.querySelector('.room-container');
      if (rotateBtn && roomContainer) {
        rotateBtn.addEventListener('click', () => {
          roomContainer.classList.toggle('mobile-rotated');
        });
      }
    });
  </script>
</body>
</html>
